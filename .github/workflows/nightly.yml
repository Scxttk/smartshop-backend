name: Nightly fetch+push

on:
  schedule:
    # 04:30 UTC = 06:30 MESZ (Sommer) bzw. 05:30 MEZ (Winter) — siehe docs/ci.md.
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      plz:
        description: "Nur diese PLZ syncen (On-Demand-Trigger); leer = Voll-Sync"
        required: false
        default: ""

concurrency:
  # On-Demand-Läufe für verschiedene PLZs dürfen parallel zum Voll-Sync laufen.
  group: nightly-${{ inputs.plz || 'all' }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  nightly:
    runs-on: ubuntu-latest
    # 6+ Regionen mit Bild-Spiegelung + Rust-Build brauchen deutlich mehr als
    # 45 min — die Läufe vom 18.07. wurden bei 45 min abgebrochen.
    timeout-minutes: 150
    env:
      SMARTSHOP_ZIP: ${{ vars.SMARTSHOP_ZIP }}
      # `secrets` ist in Step-`if` nicht erlaubt — Verfügbarkeit hier als Env-Flag.
      REWE_SECRETS_SET: ${{ secrets.REWE_CERT_PEM != '' && secrets.REWE_KEY_PEM != '' }}
      DB: ${{ github.workspace }}/nightly.db
      LOG: ${{ github.workspace }}/nightly.log
    steps:
      - uses: actions/checkout@v4

      - name: Preflight (ZIP variable, curl, sqlite3)
        run: |
          if [ -z "$SMARTSHOP_ZIP" ]; then
            echo "::error::Repo-Variable SMARTSHOP_ZIP ist nicht gesetzt (Settings -> Variables)."
            exit 1
          fi
          # Netto/ALDI Süd/EDEKA werden über system-curl geholt (Akamai).
          command -v curl >/dev/null || { echo "::error::curl fehlt auf dem Runner."; exit 1; }
          curl --version | head -1
          command -v sqlite3 >/dev/null || { sudo apt-get update && sudo apt-get install -y sqlite3; }
          sqlite3 --version

      # On-Demand-Pfad: vorgebautes Binary aus dem letzten erfolgreichen
      # CI-Lauf auf master laden statt ~6 min zu bauen. Fallback: normaler
      # Build, wenn (noch) kein Artefakt existiert oder es abgelaufen ist.
      - name: Download prebuilt binary (on-demand)
        id: prebuilt
        if: inputs.plz != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          FOUND=false
          # SICHERHEIT: Nur Artefakte aus Push-Läufen auf master IN DIESEM Repo
          # ausführen. `--branch` filtert nur den Head-Branch-*Namen*, den ein
          # Fork-PR frei wählt (Branch "master" im Fork) — so ein Lauf ist ein
          # `pull_request`-Event aus einem Fremd-Repo. `--event push` schließt
          # PR-Läufe aus (Push auf master braucht hier Schreibrechte), und die
          # head_repository-Prüfung stellt sicher, dass das Binary aus diesem
          # Repository stammt, bevor es im Secrets-Job ausgeführt wird.
          RUN_ID=$(gh run list --workflow ci.yml --branch master --event push \
            --status success --limit 1 --json databaseId --jq '.[0].databaseId' || true)
          if [ -n "$RUN_ID" ]; then
            HEAD_REPO=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID" \
              --jq '.head_repository.full_name' || true)
            if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
              echo "::warning::CI-Lauf $RUN_ID stammt nicht aus $GITHUB_REPOSITORY (head_repository=$HEAD_REPO) — ignoriere Artefakt."
              RUN_ID=""
            fi
          fi
          if [ -n "$RUN_ID" ] \
              && gh run download "$RUN_ID" --name smartshop-linux-x86_64 --dir prebuilt \
              && [ -f prebuilt/smartshop ]; then
            mkdir -p target/release
            install -m 0755 prebuilt/smartshop target/release/smartshop
            if ./target/release/smartshop --help >/dev/null 2>&1; then
              echo "Prebuilt Binary aus CI-Lauf $RUN_ID übernommen."
              FOUND=true
            fi
          fi
          [ "$FOUND" = true ] || echo "::warning::Kein brauchbares CI-Artefakt — baue selbst."
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - uses: Swatinem/rust-cache@v2
        if: steps.prebuilt.outputs.found != 'true'

      - name: Build release
        if: steps.prebuilt.outputs.found != 'true'
        run: cargo build --release

      # Rewe-Client-Zertifikat einrichten — nur wenn die Secrets gesetzt sind.
      # Ohne Secrets bleibt REWE_CERT/REWE_KEY leer und der Sync läuft wie
      # bisher ohne Rewe durch (kein Fehler). Die Secrets liegen als PEM oder
      # base64-kodiertes PEM vor (base64 -d schlägt bei Plain-PEM nicht fehl,
      # solange es gültiges base64 ist; wir dekodieren immer und schreiben das
      # Ergebnis — bei Plain-PEM setze base64-kodierte Secrets via `gh secret set`).
      - name: Setup Go (für rewerse)
        if: ${{ env.REWE_SECRETS_SET == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup rewerse + Rewe-Zertifikat
        id: rewe
        if: ${{ env.REWE_SECRETS_SET == 'true' }}
        env:
          REWE_CERT_PEM: ${{ secrets.REWE_CERT_PEM }}
          REWE_KEY_PEM: ${{ secrets.REWE_KEY_PEM }}
        run: |
          set -euo pipefail
          go install github.com/ByteSizedMarius/rewerse-engineering/cmd@latest
          ln -sf "$(go env GOPATH)/bin/cmd" "$(go env GOPATH)/bin/rewerse"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          CERT="$RUNNER_TEMP/rewe-cert.pem"
          KEY="$RUNNER_TEMP/rewe-private.key"
          printf '%s' "$REWE_CERT_PEM" | base64 -d > "$CERT"
          printf '%s' "$REWE_KEY_PEM"  | base64 -d > "$KEY"
          chmod 600 "$CERT" "$KEY"
          echo "cert=$CERT" >> "$GITHUB_OUTPUT"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      # Primärpfad: alle aktiven Regionen aus public.regions syncen
      # (fetch + markets-Upsert + push pro PLZ). Rewe wird nur mitgezogen, wenn
      # oben Cert+Key eingerichtet wurden (--cert/--key gesetzt); sonst schlägt
      # Rewe pro Store fehl, das ist dann erwartet.
      # Schlägt der ganze Sync fehl (Tabelle leer/unerreichbar, alle
      # Regionen gescheitert), greift der Fallback-Step unten.
      - name: Sync regions (fetch+push per region)
        id: sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REWE_CERT: ${{ steps.rewe.outputs.cert }}
          REWE_KEY: ${{ steps.rewe.outputs.key }}
          ONLY_PLZ: ${{ inputs.plz }}
        run: |
          set -o pipefail
          CERT_ARGS=()
          [ -n "${REWE_CERT:-}" ] && [ -f "$REWE_CERT" ] && CERT_ARGS+=(--cert "$REWE_CERT")
          [ -n "${REWE_KEY:-}" ] && [ -f "$REWE_KEY" ] && CERT_ARGS+=(--key "$REWE_KEY")
          # On-Demand-Trigger (Region-INSERT): nur die neue PLZ syncen.
          ONLY_ARGS=()
          [ -n "${ONLY_PLZ:-}" ] && ONLY_ARGS+=(--only "$ONLY_PLZ")
          if ./target/release/smartshop sync-regions --db "$DB" \
              ${ONLY_ARGS[@]+"${ONLY_ARGS[@]}"} \
              ${CERT_ARGS[@]+"${CERT_ARGS[@]}"} 2>&1 | tee "$LOG"; then
            echo "sync_failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::sync-regions fehlgeschlagen — Fallback auf Einzel-PLZ $SMARTSHOP_ZIP."
          fi

      # Bootstrap-Fallback: alter Einzel-PLZ-Pfad mit SMARTSHOP_ZIP, damit die
      # Pipeline nie dunkel geht. Bei On-Demand-Läufen (inputs.plz) wäre der
      # Fallback die falsche PLZ — dort übernimmt der nächtliche Voll-Sync.
      - name: Fallback fetch+push (single ZIP)
        if: steps.sync.outputs.sync_failed == 'true' && inputs.plz == ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REWE_CERT: ${{ steps.rewe.outputs.cert }}
          REWE_KEY: ${{ steps.rewe.outputs.key }}
        run: |
          set -o pipefail
          CERT_ARGS=()
          [ -n "${REWE_CERT:-}" ] && [ -f "$REWE_CERT" ] && CERT_ARGS+=(--cert "$REWE_CERT")
          [ -n "${REWE_KEY:-}" ] && [ -f "$REWE_KEY" ] && CERT_ARGS+=(--key "$REWE_KEY")
          ./target/release/smartshop fetch --all-stores \
            --zip "$SMARTSHOP_ZIP" --db "$DB" \
            ${CERT_ARGS[@]+"${CERT_ARGS[@]}"} 2>&1 | tee -a "$LOG"
          ./target/release/smartshop push --region "$SMARTSHOP_ZIP" --db "$DB" \
            2>&1 | tee -a "$LOG"

      - name: Store summary + zero-offer check
        if: always()
        run: |
          {
            echo "## Nightly sync"
            # Jeden "Zusammenfassung"-Block aus dem Log (einer pro Region,
            # bzw. "Zusammenfassung:" im Fallback) in eine Markdown-Tabelle
            # umformen (Spalten sind mit >=2 Leerzeichen getrennt).
            awk '
              /^Zusammenfassung/ {
                title=$0; sub(/:$/, "", title)
                if (title == "Zusammenfassung") title = "Zusammenfassung (Fallback PLZ)"
                print ""
                print "### " title
                print ""
                print "| Markt | Filiale | Ergebnis |"
                print "|---|---|---|"
                inblk=1; header_skipped=0; next
              }
              inblk {
                if ($0 !~ /^  /) { inblk=0; next }
                if (!header_skipped) { header_skipped=1; next }
                line=$0; sub(/^ +/, "", line); gsub(/ {2,}/, " | ", line)
                print "| " line " |"
              }
            ' "$LOG"
          } >> "$GITHUB_STEP_SUMMARY"

          COUNT=0
          [ -f "$DB" ] && COUNT=$(sqlite3 "$DB" 'SELECT COUNT(*) FROM offers')
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Angebote in der lokalen DB (letzte Region): $COUNT**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::0 Angebote in der DB — alle Stores fehlgeschlagen (Akamai blockt evtl. Runner-IPs, siehe docs/ci.md)."
            exit 1
          fi
          echo "$COUNT Angebote in der DB."

      # Verwaiste Bucket-Bilder aufräumen: der Push löscht veraltete offer-Zeilen
      # (push.rs), aber nie ihre gespiegelten Bilder — der offer-images-Bucket
      # wuchs so über das Free-Limit. Nur beim vollen
      # Nightly-Sync (nicht bei On-Demand-per-PLZ) und nur Objekte älter als
      # 1 Tag: das schützt frisch Gespiegeltes gegen parallel laufende
      # On-Demand-Läufe, die ihre Bilder noch nicht in offers.image_url haben.
      - name: Prune orphaned bucket images
        if: inputs.plz == ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ./target/release/smartshop prune-images --execute --min-age-days 1 \
            2>&1 | tee -a "$LOG"

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-log
          path: nightly.log
          if-no-files-found: ignore
          retention-days: 7
# (touch: force GitHub workflow registration)
