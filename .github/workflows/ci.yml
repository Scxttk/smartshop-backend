name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets

      # Live-Scraper-Tests sind #[ignore] und bleiben hier ausgeschlossen
      # (kein --include-ignored / --ignored verwenden).
      - name: cargo test (offline only)
        run: cargo test
